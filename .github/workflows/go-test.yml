name: Go Test

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - '.github/workflows/go-test.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - '.github/workflows/go-test.yml'
  workflow_dispatch:

permissions:
  contents: read

# 同一分支并发测试只保留最新一次
concurrency:
  group: go-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race -count=1 ./...

      - name: Test coverage
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1
