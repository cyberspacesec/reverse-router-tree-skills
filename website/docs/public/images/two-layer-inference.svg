<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" width="860" height="560" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6fbf8"/>
      <stop offset="1" stop-color="#eef6f1"/>
    </linearGradient>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3aa676"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke-width: 1.5; }
      .phys { stroke: #1f7ad6; }
      .logic { stroke: #d9a441; }
      .ttl { font-size: 14px; font-weight: 700; }
      .lbl { font-size: 12px; font-weight: 600; fill: #1f2d3d; }
      .desc { font-size: 11px; fill: #5a6b7b; }
      .val { font-family: monospace; font-size: 11px; fill: #37474f; }
      .arrow { stroke: #3aa676; stroke-width: 2; fill: none; }
      .result { fill: #fff8e6; stroke: #d9a441; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="860" height="560" fill="url(#bg2)" rx="12"/>

  <text x="430" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2d3d">两层类型推断协同：宽容 + 精确</text>
  <text x="430" y="54" text-anchor="middle" font-size="12" fill="#5a6b7b">物理层用宽模式保证能合并，逻辑层用精确模式标语义</text>

  <!-- 输入值 -->
  <rect x="30" y="78" width="180" height="120" rx="8" fill="#1f2d3d"/>
  <text x="120" y="100" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">输入值（4 个）</text>
  <g font-family="monospace" font-size="11" fill="#cfd8dc">
    <text x="42" y="124">13812345678  ✓ 合法手机号</text>
    <text x="42" y="142">15912345678  ✓ 合法手机号</text>
    <text x="42" y="160">12345678901  ✗ 非法(第2位是2)</text>
    <text x="42" y="178">18612345678  ✓ 合法手机号</text>
  </g>

  <!-- 物理层 -->
  <rect class="box phys" x="270" y="78" width="280" height="120" rx="8"/>
  <text x="410" y="98" text-anchor="middle" class="ttl" fill="#1f7ad6">物理层 PhysicalTypeInference</text>
  <text x="410" y="116" text-anchor="middle" class="desc">宽模式：integer 几乎匹配所有数字</text>
  <g class="val">
    <text x="284" y="140">phone 模式匹配率: 3/4 = 0.75</text>
    <text x="284" y="158">integer 模式匹配率: 4/4 = 1.0</text>
    <text x="284" y="180" fill="#1f7ad6" font-weight="700">→ 选 integer（更高匹配率）</text>
  </g>
  <rect x="284" y="78" width="6" height="120" fill="#1f7ad6"/>

  <!-- 逻辑层 -->
  <rect class="box logic" x="270" y="230" width="280" height="120" rx="8"/>
  <text x="410" y="250" text-anchor="middle" class="ttl" fill="#d9a441">逻辑层 LogicalTypeInference</text>
  <text x="410" y="268" text-anchor="middle" class="desc">精确模式 + 60% 阈值容忍</text>
  <g class="val">
    <text x="284" y="292">phone 正则匹配率: 3/4 = 0.75</text>
    <text x="284" y="310">阈值 0.6 → 0.75 ≥ 0.6 ✓</text>
    <text x="284" y="332" fill="#d9a441" font-weight="700">→ 逻辑类型 = phone</text>
  </g>
  <rect x="284" y="230" width="6" height="120" fill="#d9a441"/>

  <!-- 物理层→逻辑层 箭头 -->
  <path class="arrow" d="M410,198 L410,228" marker-end="url(#arrow2)"/>
  <text x="420" y="216" font-size="10" fill="#5a6b7b">协同</text>

  <!-- 结果 -->
  <rect class="result" x="590" y="230" width="240" height="120" rx="8"/>
  <text x="710" y="252" text-anchor="middle" class="ttl" fill="#6b4f12">最终结果</text>
  <g font-family="monospace" font-size="12" fill="#6b4f12">
    <text x="710" y="282" text-anchor="middle">{users_id} [Var]</text>
    <text x="710" y="304" text-anchor="middle">物理类型: integer</text>
    <text x="710" y="326" text-anchor="middle">逻辑类型: phone ✓</text>
  </g>
  <path class="arrow" d="M550,290 L588,290" marker-end="url(#arrow2)"/>

  <!-- 输入→物理层 箭头 -->
  <path class="arrow" d="M210,138 L268,138" marker-end="url(#arrow2)"/>

  <!-- 底部说明 -->
  <rect x="30" y="386" width="800" height="148" rx="8" fill="#ffffff" stroke="#cfd8dc"/>
  <text x="46" y="410" font-size="13" font-weight="700" fill="#1f2d3d">为什么这样设计</text>
  <g font-size="12" fill="#37474f">
    <text x="46" y="434">▸ 物理层宽容（integer 宽匹配）：即使有 1 个噪声数据（非法手机号），仍能合并成变量</text>
    <text x="46" y="456">▸ 逻辑层精确（phone 严格正则 + 阈值）：识别出语义，不被噪声拉偏</text>
    <text x="46" y="478">▸ 阈值 0.6 容忍：3/4 合法即判定 phone，兼容异常数据混合</text>
    <text x="46" y="500">▸ 变量名基于物理层（users_id），语义标注基于逻辑层（phone）—— 两者各司其职</text>
    <text x="46" y="522" fill="#5a6b7b" font-size="11">长数字串（≥16位）特殊处理：物理层降级为 string 避 int64 溢出，逻辑层仍识别 idcard/bankcard</text>
  </g>
</svg>
